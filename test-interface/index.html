<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Skill Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="Dashboard pour visualiser les skills Gemini CLI installées.">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="title">Gemini <span class="accent">Skill Dashboard</span></h1>
            <p class="subtitle">Orchestration & Design System</p>
            <button id="simulate-task" class="btn-primary">Simuler une Tâche</button>
        </div>
    </header>

    <main class="container">
        <section id="skills-grid" class="bento-grid">
            <!-- Les skills seront injectées ici par app.js -->
            <div class="loader">Chargement des compétences...</div>
        </section>

        <section id="terminal-section" class="terminal-container" style="display: none;">
            <div class="terminal-header">
                <span>Console d'Orchestration</span>
                <div class="terminal-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
            <div id="terminal-logs" class="terminal-body">
                <!-- Logs de simulation -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 - P:\NABIL\dev_gemini - Architecture by Senior Dev & UI/UX Pro</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
