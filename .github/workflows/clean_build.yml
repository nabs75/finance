name: Clean Build Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: "actions/checkout@main"
    
    - name: Set up JDK 17
      uses: "actions/setup-java@main"
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Manual Gradle 8.7 Installation
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip -q gradle-8.7-bin.zip
        echo "$(pwd)/gradle-8.7/bin" >> $GITHUB_PATH

    - name: Build with Manual Gradle
      run: |
        cd streamfree-music-android
        gradle assembleDebug --no-daemon --stacktrace
      working-directory: .

    - name: Upload APK
      uses: "actions/upload-artifact@main"
      with:
        name: streamfree-music-debug
        path: streamfree-music-android/app/build/outputs/apk/debug/app-debug.apk
