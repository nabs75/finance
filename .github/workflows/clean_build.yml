name: Clean Build Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
    
    - name: Set up JDK 17
      uses: actions/setup-java@38703027453c0222956969507f3c14888219610f
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        cd streamfree-music-android
        gradle assembleDebug
      working-directory: .

    - name: Upload APK
      uses: actions/upload-artifact@65b83289127c443c45333af932a27a858c5351a6
      with:
        name: streamfree-music-debug
        path: streamfree-music-android/app/build/outputs/apk/debug/app-debug.apk
