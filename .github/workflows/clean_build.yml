name: Clean Build Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: "actions/checkout@v4"
    
    - name: Set up JDK 17
      uses: "actions/setup-java@v4"
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # Re-tenter le cache natif plus stable que le plugin tiers

    - name: Build with Gradle
      run: |
        cd streamfree-music-android
        # On force la création du wrapper pour être sûr
        gradle wrapper --gradle-version 8.7
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
      working-directory: .

    - name: Upload APK
      uses: "actions/upload-artifact@v4"
      with:
        name: streamfree-music-debug
        path: streamfree-music-android/app/build/outputs/apk/debug/app-debug.apk
